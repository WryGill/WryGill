name: Generate Snake Contribution Graph
on:
  schedule:
    - cron: "0 0 * * *"  # Runs at 00:00 UTC every day
  workflow_dispatch:       # Allows manual trigger

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Generate Snake Game from GitHub Contribution Graph
        uses: PlatziMaqui/github-contribution-grid-snake@main
        with:
          github_user_name: WryGill
          gif_out_path: dist/assets/github-contribution-grid-snake.gif
          svg_out_path: dist/assets/github-contribution-grid-snake.svg

      - name: Push to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}