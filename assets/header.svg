<svg xmlns="http://www.w3.org/2000/svg" width="800" height="220" viewBox="0 0 800 220">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#EEF2FF;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#DBEAFE;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#E0E7FF;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#2563EB;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7C3AED;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="220" rx="16" fill="url(#bg)" />

  <!-- Decorative dots pattern -->
  <g opacity="0.08">
    <circle cx="60" cy="40" r="3" fill="#2563EB"/>
    <circle cx="90" cy="40" r="3" fill="#2563EB"/>
    <circle cx="60" cy="70" r="3" fill="#2563EB"/>
    <circle cx="90" cy="70" r="3" fill="#7C3AED"/>
    <circle cx="120" cy="40" r="3" fill="#7C3AED"/>
    <circle cx="120" cy="70" r="3" fill="#2563EB"/>
    <circle cx="150" cy="55" r="3" fill="#2563EB"/>
    <circle cx="680" cy="170" r="3" fill="#7C3AED"/>
    <circle cx="710" cy="170" r="3" fill="#7C3AED"/>
    <circle cx="680" cy="200" r="3" fill="#2563EB"/>
    <circle cx="710" cy="200" r="3" fill="#2563EB"/>
    <circle cx="740" cy="185" r="3" fill="#7C3AED"/>
    <circle cx="740" cy="155" r="3" fill="#2563EB"/>
  </g>

  <!-- Code bracket decoration -->
  <text x="55" y="148" font-family="monospace" font-size="72" fill="url(#accent)" opacity="0.12">&lt;/&gt;</text>

  <!-- Main name -->
  <text x="400" y="95" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="52" font-weight="700" fill="url(#accent)">
    Aromatic
  </text>

  <!-- Subtitle line -->
  <line x1="260" y1="112" x2="540" y2="112" stroke="url(#accent)" stroke-width="2" opacity="0.3"/>

  <!-- Subtitle text -->
  <text x="400" y="145" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="18" fill="#57606A" letter-spacing="2">
    Backend Engineer · UESTC
  </text>

  <!-- Terminal cursor blink hint -->
  <rect x="530" y="128" width="10" height="20" rx="2" fill="#2563EB" opacity="0.7"/>

  <!-- Bottom accent bar -->
  <rect x="300" y="180" width="200" height="4" rx="2" fill="url(#accent)" opacity="0.4"/>
</svg>