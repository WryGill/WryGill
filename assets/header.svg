<svg xmlns="http://www.w3.org/2000/svg" width="800" height="200" viewBox="0 0 800 200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#EEF2FF;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#DBEAFE;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#E0E7FF;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#2563EB;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7C3AED;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="200" rx="16" fill="url(#bg)" />

  <!-- Decorative dots pattern (top-left) -->
  <g opacity="0.07">
    <circle cx="50" cy="35" r="3" fill="#2563EB"/>
    <circle cx="80" cy="35" r="3" fill="#2563EB"/>
    <circle cx="50" cy="65" r="3" fill="#7C3AED"/>
    <circle cx="80" cy="65" r="3" fill="#7C3AED"/>
    <circle cx="110" cy="35" r="3" fill="#7C3AED"/>
    <circle cx="110" cy="65" r="3" fill="#2563EB"/>
    <circle cx="140" cy="50" r="3" fill="#2563EB"/>
    <!-- Bottom-right cluster -->
    <circle cx="680" cy="155" r="3" fill="#7C3AED"/>
    <circle cx="710" cy="155" r="3" fill="#7C3AED"/>
    <circle cx="680" cy="185" r="3" fill="#2563EB"/>
    <circle cx="710" cy="185" r="3" fill="#2563EB"/>
    <circle cx="740" cy="170" r="3" fill="#7C3AED"/>
  </g>

  <!-- Code bracket decoration (background) -->
  <text x="55" y="145" font-family="monospace" font-size="64" fill="url(#accent)" opacity="0.08">&lt;/&gt;</text>

  <!-- Main name -->
  <text x="400" y="90" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="48" font-weight="700" fill="url(#accent)">
    Aromatic
  </text>

  <!-- Thin separator line -->
  <line x1="280" y1="105" x2="520" y2="105" stroke="url(#accent)" stroke-width="1.5" opacity="0.25"/>

  <!-- Subtitle -->
  <text x="400" y="135" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="17" fill="#57606A" letter-spacing="2">
    Backend Engineer · UESTC
  </text>

  <!-- Bottom accent bar -->
  <rect x="330" y="170" width="140" height="3.5" rx="2" fill="url(#accent)" opacity="0.35"/>
</svg>